name: Build and Deploy Icons

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache cargo bin
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/resvg
          key: ${{ runner.os }}-resvg
          restore-keys: |
            ${{ runner.os }}-resvg-

      - name: Install resvg
        run: cargo install resvg --locked

      - name: Build assets
        run: |
          mkdir -p out/uxicons/icons
          mkdir -p out/uxicons/global

          echo "Processing packages..."
          if [ -d packages ]; then
            for dir in packages/*; do
              [ -d "$dir" ] || continue
              pkg=$(basename "$dir")
              mkdir -p out/uxicons/icons/$pkg

              for file in "$dir"/*.svg; do
                [ -f "$file" ] || continue
                name=$(basename "$file" .svg)
                echo "Converting $file → $name.png"
                resvg "$file" "out/uxicons/icons/$pkg/$name.png" -w 192 -h 192
              done
            done
          fi

          echo "Processing global..."
          if [ -d global ]; then
            for f in global/*; do
              [ -f "$f" ] || continue
              cp "$f" out/uxicons/global/
            done
          fi

          echo "Copying index.json..."
          cp index.json out/uxicons/index.json

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./out
